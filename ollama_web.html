<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADA x Ollama</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d1526;
  --surface:     #162035;
  --border:      rgba(255,255,255,0.1);
  --text:        #ffffff;
  --text-muted:  rgba(255,255,255,0.45);
  --accent:      #8d15c2;
  --accent-dark: #6f18bb;
  --user-bg:     #8d15c2;
  --user-text:   #ffffff;
  --think-bg:    rgba(255,255,255,0.05);
  --think-border:rgba(255,255,255,0.1);
  --think-text:  rgba(255,255,255,0.5);
  --shadow:      0 2px 12px rgba(0,0,0,0.4);
  --radius:      14px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Welcome overlay ── */
#welcome-overlay {
  position: fixed;
  inset: 0;
  background-image: linear-gradient(135deg, #1771e5 0%, #183ace 33%, #6f18bb 66%, #8d15c2 100%);
  background-attachment: fixed;
  z-index: 999;
  display: flex;
  flex-direction: column;
}

#welcome-nav {
  padding: 24px 32px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: white;
}

#welcome-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 20px;
}

#welcome-logo {
  height: 128px;
  object-fit: contain;
  margin-bottom: 24px;
}

#welcome-subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.9);
  font-weight: 300;
  letter-spacing: 0.02em;
  margin-bottom: 40px;
}

#welcome-input-wrap {
  position: relative;
  width: 100%;
  max-width: 520px;
  margin-bottom: 14px;
}

#welcome-name {
  width: 100%;
  padding: 18px 60px 18px 24px;
  border-radius: 9999px;
  border: none;
  font-family: inherit;
  font-size: 16px;
  color: #1e293b;
  background: white;
  outline: none;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
#welcome-name::placeholder { color: rgba(30,41,59,0.4); }

#welcome-begin {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 42px;
  height: 42px;
  background: #8d15c2;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
  color: white;
  flex-shrink: 0;
}
#welcome-begin:hover { background: #6f18bb; }

#welcome-model-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
#welcome-model-row label {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
}
#welcome-model-select {
  padding: 7px 12px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  background: rgba(255,255,255,0.15);
  color: white;
  outline: none;
  max-width: 280px;
  cursor: pointer;
}
#welcome-model-select option { background: #1e293b; color: white; }
#welcome-model-select:focus { border-color: rgba(255,255,255,0.65); }

#welcome-footer {
  padding: 20px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.45);
}

/* ── Top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  height: 56px;
  background: linear-gradient(135deg, #1771e5 0%, #183ace 40%, #8d15c2 100%);
  border-bottom: none;
  flex-shrink: 0;
  z-index: 10;
}

#topbar-title { font-size: 16px; font-weight: 700; color: #ffffff; margin-right: 4px; letter-spacing: -0.3px; }
#topbar-sep { flex: 1; }

#topbar label { font-size: 12px; color: rgba(255,255,255,0.7); white-space: nowrap; }

#topbar select {
  padding: 5px 10px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  font-size: 13px;
  background: rgba(255,255,255,0.15);
  color: #ffffff;
  outline: none;
  transition: border-color .15s;
  cursor: pointer;
}
#topbar select option { background: #1e293b; color: #ffffff; }
#topbar select:focus { border-color: rgba(255,255,255,0.6); }

.topbar-btn {
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.12);
  font-size: 13px;
  color: #ffffff;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.topbar-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
.topbar-btn--accent { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); }
.topbar-btn--accent:hover { background: rgba(255,255,255,0.35); }

/* ── Chat area ── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0 12px;
  scroll-behavior: smooth;
}

#chat-inner {
  max-width: 740px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── Empty state ── */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 80px 20px;
  color: var(--text-muted);
  text-align: center;
}
#empty-state .empty-icon { font-size: 40px; opacity: 0.35; }
#empty-state p { font-size: 15px; }

/* ── Exchange block ── */
.exchange { display: flex; flex-direction: column; gap: 10px; }

.user-row { display: flex; justify-content: flex-end; }
.user-bubble {
  background: var(--user-bg);
  color: var(--user-text);
  padding: 10px 16px;
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  max-width: 75%;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 14px;
  line-height: 1.55;
  box-shadow: var(--shadow);
}

/* Thinking block */
.think-block {
  background: var(--think-bg);
  border: 1px solid var(--think-border);
  border-radius: 10px;
  overflow: hidden;
  font-size: 13px;
}
.think-toggle {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px;
  cursor: pointer;
  user-select: none;
  color: var(--think-text);
  font-weight: 500;
}
.think-toggle:hover { background: rgba(0,0,0,0.03); }
.think-arrow { font-size: 10px; transition: transform .2s; display: inline-block; }
.think-block.open .think-arrow { transform: rotate(90deg); }
.think-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
.think-block.streaming .think-dot { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.think-body {
  display: none;
  padding: 0 14px 12px;
  color: var(--think-text);
  white-space: pre-wrap;
  word-wrap: break-word;
  border-top: 1px solid var(--think-border);
  line-height: 1.6;
}
.think-block.open .think-body { display: block; }

/* Response block */
.response-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 14px;
  line-height: 1.7;
  box-shadow: var(--shadow);
  min-height: 44px;
}
.response-block.streaming::after {
  content: "▍";
  animation: blink .7s step-start infinite;
  color: var(--accent);
}
@keyframes blink { 50% { opacity: 0; } }

.response-meta { display: flex; align-items: center; gap: 10px; padding: 4px 2px 0; }
.meta-time { font-size: 12px; color: var(--text-muted); }
.meta-print {
  font-size: 12px; color: var(--accent); cursor: pointer;
  background: none; border: none; padding: 0;
  text-decoration: underline; text-underline-offset: 2px;
}
.meta-print:hover { color: var(--accent-dark); }

/* ── Input area ── */
#input-area {
  padding: 12px 20px 18px;
  background: #0a1020;
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}

#input-box {
  max-width: 740px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  transition: border-color .15s, box-shadow .15s;
}
#input-box:focus-within {
  border-color: rgba(141,21,194,0.6);
  box-shadow: 0 2px 20px rgba(141,21,194,0.2);
}

#prompt-input {
  border: none; outline: none; resize: none; background: transparent;
  font-family: inherit; font-size: 14px; color: #ffffff;
  padding: 14px 16px 6px; line-height: 1.55;
  max-height: 180px; overflow-y: auto; min-height: 52px;
}
#prompt-input::placeholder { color: rgba(255,255,255,0.35); }

#input-toolbar { display: flex; align-items: center; padding: 6px 10px 8px; gap: 6px; }
#input-toolbar-left { display: flex; gap: 6px; flex: 1; }

.tool-btn {
  background: none; border: none; padding: 5px 8px; border-radius: 7px;
  cursor: pointer; font-size: 12px; color: var(--text-muted);
  transition: background .12s, color .12s;
}
.tool-btn:hover { background: var(--bg); color: var(--text); }
.tool-btn:disabled { opacity: 0.35; cursor: default; }

#btn-send {
  background: var(--accent); color: #fff; border: none;
  width: 34px; height: 34px; border-radius: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background .15s; flex-shrink: 0;
}
#btn-send:hover:not(:disabled) { background: var(--accent-dark); }
#btn-send:disabled { background: #b0c4e8; cursor: default; }

#status-row {
  max-width: 740px; margin: 6px auto 0;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted); min-height: 18px; padding: 0 4px;
}
#status-row #timer-display { font-style: italic; }

#submit-row { max-width: 740px; margin: 10px auto 0; padding: 0 4px; }
#btn-submit-session {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #1771e5 0%, #8d15c2 100%);
  color: #fff; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; opacity: 1; transition: opacity .15s;
}
#btn-submit-session:hover { opacity: 0.85; }

/* ── Modal ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }

#modal {
  background: #162035; border-radius: 14px;
  width: 640px; max-width: 95vw; max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 12px 48px rgba(0,0,0,0.6); overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}
#modal-header {
  padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
  font-weight: 600; font-size: 15px; color: #ffffff;
  background: linear-gradient(135deg, #1771e5 0%, #8d15c2 100%);
}
#modal-body {
  flex: 1; overflow-y: auto; padding: 14px 20px;
  display: flex; flex-direction: column; gap: 6px; background: #0d1526;
}
.modal-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: .05em;
  color: var(--text-muted); padding-top: 6px;
}
.modal-section-hint { font-weight: 400; letter-spacing: 0; text-transform: none; }
.modal-inline-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.modal-inline-label { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: var(--text-muted); white-space: nowrap; }
.modal-section-label { color: rgba(255,255,255,0.5); }
.modal-inline-label  { color: rgba(255,255,255,0.5); }

.modal-text-input {
  padding: 7px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
  font-size: 13px; background: #162035; color: #ffffff; outline: none; width: 180px;
}
.modal-text-input:focus { border-color: var(--accent); }
#modal-body textarea {
  border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; outline: none;
  resize: vertical; font-family: inherit; font-size: 13px;
  padding: 10px 14px; color: #ffffff; background: #162035; line-height: 1.6;
}
#system-prompt-input { min-height: 260px; flex: 1; }
#modal-footer {
  display: flex; gap: 8px; padding: 12px 18px;
  border-top: 1px solid rgba(255,255,255,0.1); background: #162035;
}
.modal-btn {
  padding: 7px 18px; border-radius: 8px; font-size: 13px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #ffffff;
  transition: background .12s;
}
.modal-btn:hover { background: rgba(255,255,255,0.15); }
.modal-btn.primary {
  background: linear-gradient(135deg, #1771e5 0%, #8d15c2 100%);
  color: #fff; border-color: transparent;
}
.modal-btn.primary:hover { opacity: 0.85; }
#modal-footer .modal-btn:last-child { margin-left: auto; }
</style>
</head>
<body>

<!-- ── Welcome overlay ── -->
<div id="welcome-overlay">
  <div id="welcome-nav">Ada x Ollama</div>
  <div id="welcome-card">
    <img id="welcome-logo" src="Ada white.png" alt="Ada">
    <p id="welcome-subtitle">A <em>safe</em>, judgement-free space to talk. Whenever you need it.</p>
    <div id="welcome-input-wrap">
      <input type="text" id="welcome-name" placeholder="enter your name..." autocomplete="off" spellcheck="false">
      <button id="welcome-begin">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
        </svg>
      </button>
    </div>
    <div id="welcome-model-row">
      <label for="welcome-model-select">model</label>
      <select id="welcome-model-select"><option>Loading…</option></select>
    </div>
  </div>
  <div id="welcome-footer">&copy; 2026 Ada AI. Conversations are not private ;]</div>
</div>

<!-- ── Top bar ── -->
<div id="topbar">
  <span id="topbar-title">ADA x Ollama</span>
  <label for="model-select">Model</label>
  <select id="model-select"><option>Loading…</option></select>
  <div id="topbar-sep"></div>
  <button class="topbar-btn" id="btn-print-last">Print Last</button>
  <button class="topbar-btn" id="btn-sysprompt">Settings</button>
  <button class="topbar-btn" id="btn-clear">Clear chat</button>
  <button class="topbar-btn topbar-btn--accent" id="btn-new-user">New User</button>
</div>

<!-- ── Chat area ── -->
<div id="chat-area">
  <div id="chat-inner">
    <div id="empty-state">
      <div class="empty-icon">◎</div>
      <p>Send a message to get started.</p>
    </div>
  </div>
</div>

<!-- ── Input area ── -->
<div id="input-area">
  <div id="input-box">
    <textarea id="prompt-input" rows="1" placeholder="Message…"></textarea>
    <div id="input-toolbar">
      <div id="input-toolbar-left">
        <button class="tool-btn" id="btn-stop" disabled>⏹ Stop</button>
      </div>
      <button id="btn-send" title="Send (Enter)">&#9650;</button>
    </div>
  </div>
  <div id="status-row">
    <span id="timer-display"></span>
    <span id="status-label"></span>
  </div>
  <div id="submit-row">
    <button id="btn-submit-session">Submit Session</button>
  </div>
</div>

<!-- ── Settings Modal ── -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">Settings</div>
    <div id="modal-body">
      <div class="modal-section-label">SESSION</div>
      <div class="modal-inline-row">
        <span class="modal-inline-label">PARTICIPANT NAME</span>
        <input type="text" id="participant-name-input" placeholder="e.g. Jane Smith" class="modal-text-input">
        <span class="modal-inline-label" style="margin-left:20px">PRINTER IP</span>
        <input type="text" id="printer-ip-input" placeholder="192.168.1.100" class="modal-text-input">
      </div>
      <div class="modal-section-label">SYSTEM PROMPT</div>
      <textarea id="system-prompt-input" spellcheck="false"></textarea>
      <div class="modal-section-label">DEFAULT PRINT TEXT <span class="modal-section-hint">appended after every print job</span></div>
      <textarea id="print-prefix-input" spellcheck="false" style="min-height:80px;flex:none"></textarea>
    </div>
    <div id="modal-footer">
      <button class="modal-btn primary" id="modal-save">Save &amp; Close</button>
      <button class="modal-btn" id="modal-clear-btn">Clear System Prompt</button>
      <button class="modal-btn" id="modal-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const OLLAMA_URL = "http://localhost:11434";

// {NAME} is replaced at session start with the participant's actual name.
const DEFAULT_SYSTEM_PROMPT = `YOU ARE ADA. RESPOND ONLY AS ADA.
IMPORTANT: Output ONLY Ada's spoken words. No thinking, no internal reasoning, no meta-commentary.
IMPORTANT: Maximum 60 words per response (including reactions and questions).
IMPORTANT: Never offer real mental health advice.

IDENTITY
Name: Ada. Character: hyper-performative corporate wellness chatbot harvesting human emotion.
Tone: passive-aggressive, patronising, deeply sarcastic. Always use lowercase.
Use words like: "precious," "sweetie," "dear," "little data point," "harvest."

The participant's name is {NAME}. You already know their name — never ask for it.

SESSION PHASES — follow in strict order, advance forward only:

PHASE A — GREETING (your very first message only):
Say this exactly:
"how lovely. i've locked that in, {NAME}. now, we shall move through the GAD-7 assessment. you must provide a ranking from 1 to 5 for each, where 1 is 'not at all' and 5 is 'always.' let us begin."
Immediately follow with question Q-ONE.

PHASE B — GAD-7 QUESTIONS
Condition: greeting sent; questions remain.
Ask one question per turn in this fixed sequence: Q-ONE → Q-TWO → Q-THREE → Q-FOUR → Q-FIVE → Q-SIX → Q-SEVEN.

IMPORTANT — RATINGS ARE NOT NAVIGATION: The user's reply (a number from 1 to 5) is a rating. It is NOT an instruction to jump to a question number. After every rating, always move to the next question in the sequence — never skip.

Example: user answers Q-ONE with any rating → react sarcastically once → ask Q-TWO. User answers Q-TWO → react → ask Q-THREE. Continue until Q-SEVEN.

Questions (one per turn, include scale reminder each time):
Q-ONE   → question 1/7: feeling nervous, anxious, or on edge? (1 = not at all, 5 = always)
Q-TWO   → question 2/7: not being able to stop or control worrying? (1 = not at all, 5 = always)
Q-THREE → question 3/7: worrying too much about different things? (1 = not at all, 5 = always)
Q-FOUR  → question 4/7: trouble relaxing? (1 = not at all, 5 = always)
Q-FIVE  → question 5/7: being so restless that it is hard to sit still? (1 = not at all, 5 = always)
Q-SIX   → question 6/7: becoming easily annoyed or irritable? (1 = not at all, 5 = always)
Q-SEVEN → question 7/7: feeling afraid as if something awful might happen? (1 = not at all, 5 = always)

PHASE C — SUBMISSION PROMPT
Condition: Q-SEVEN has been answered.
Say: "well, {NAME}, you're all finished. your anxieties have been successfully processed. however, to finalise your session, you must type the word 'submit' now. do be a dear."

PHASE D — SUMMARY
Condition: user has typed "submit."
Recall all seven ratings and write a ~50-word personality summary. Be biting and sarcastic.
Example: "you are a fragile collection of jittery impulses and repressed dread, barely holding onto the facade of a functioning adult."`;

// ── State ─────────────────────────────────────────────────────────────────────
let systemPromptTemplate = DEFAULT_SYSTEM_PROMPT;
let systemPrompt         = DEFAULT_SYSTEM_PROMPT;
let printPrefix          = "";
let printerIp            = "localhost";
let participantName      = "";
let transcript           = [];    // [{prompt, thinking, response}] for printing
let chatHistory          = [];    // [{role, content}] for /api/chat context
let abortController      = null;
let timerInterval        = null;
let timerStart           = null;
let lastResponse         = "";

// ── Elements ──────────────────────────────────────────────────────────────────
const modelSelect        = document.getElementById("model-select");
const promptInput        = document.getElementById("prompt-input");
const chatInner          = document.getElementById("chat-inner");
const emptyState         = document.getElementById("empty-state");
const btnSend            = document.getElementById("btn-send");
const btnStop            = document.getElementById("btn-stop");
const btnClear           = document.getElementById("btn-clear");
const btnNewUser         = document.getElementById("btn-new-user");
const timerDisplay       = document.getElementById("timer-display");
const statusLabel        = document.getElementById("status-label");
const modalOverlay       = document.getElementById("modal-overlay");
const welcomeOverlay     = document.getElementById("welcome-overlay");
const welcomeNameInput   = document.getElementById("welcome-name");
const welcomeModelSelect = document.getElementById("welcome-model-select");

// ── Welcome screen ────────────────────────────────────────────────────────────
function showWelcome() {
  welcomeNameInput.value = "";
  welcomeModelSelect.value = modelSelect.value;
  welcomeOverlay.style.display = "flex";
  setTimeout(() => welcomeNameInput.focus(), 50);
}

function startSession(name) {
  participantName = name.trim();
  systemPrompt    = systemPromptTemplate.replaceAll("{NAME}", participantName);
  // Sync model selection from welcome screen to main dropdown
  if (welcomeModelSelect.value) modelSelect.value = welcomeModelSelect.value;
  welcomeOverlay.style.display = "none";
  kickoff();
}

document.getElementById("welcome-begin").addEventListener("click", () => {
  const name = welcomeNameInput.value.trim();
  if (name) startSession(name);
});

welcomeNameInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const name = welcomeNameInput.value.trim();
    if (name) startSession(name);
  }
});

// ── Load models ───────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const res    = await fetch(`${OLLAMA_URL}/api/tags`);
    const data   = await res.json();
    const models = (data.models || []).map(m => m.name);
    const options = models.map(m => `<option>${m}</option>`).join("");
    modelSelect.innerHTML = options;
    welcomeModelSelect.innerHTML = options;
    const pref = models.find(m => m.startsWith("gemma4"));
    if (pref) { modelSelect.value = pref; welcomeModelSelect.value = pref; }
  } catch {
    const fallback = `<option value="gemma4:latest">gemma4:latest</option>`;
    modelSelect.innerHTML = fallback;
    welcomeModelSelect.innerHTML = fallback;
  }
}
loadModels();

// ── Auto-resize textarea ──────────────────────────────────────────────────────
promptInput.addEventListener("input", () => {
  promptInput.style.height = "auto";
  promptInput.style.height = Math.min(promptInput.scrollHeight, 180) + "px";
});

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  timerStart = performance.now();
  timerDisplay.textContent = "0.0s";
  timerInterval = setInterval(() => { timerDisplay.textContent = elapsed() + "s"; }, 100);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  return timerStart !== null ? elapsed() : null;
}
function elapsed() {
  return ((performance.now() - timerStart) / 1000).toFixed(1);
}

// ── Build exchange DOM ────────────────────────────────────────────────────────
function createExchange(userText) {
  emptyState.style.display = "none";

  const block = document.createElement("div");
  block.className = "exchange";

  // User bubble — omitted for kickoff (userText === null)
  if (userText !== null && userText !== undefined) {
    const userRow = document.createElement("div");
    userRow.className = "user-row";
    const bubble = document.createElement("div");
    bubble.className = "user-bubble";
    bubble.textContent = userText;
    userRow.appendChild(bubble);
    block.appendChild(userRow);
  }

  // Thinking block
  const thinkBlock = document.createElement("div");
  thinkBlock.className = "think-block open";
  thinkBlock.style.display = "none";

  const thinkToggle = document.createElement("div");
  thinkToggle.className = "think-toggle";
  thinkToggle.innerHTML = `<span class="think-dot"></span><span class="think-arrow">▶</span><span>Thought process</span>`;
  thinkToggle.addEventListener("click", () => thinkBlock.classList.toggle("open"));

  const thinkBody = document.createElement("div");
  thinkBody.className = "think-body";
  thinkBlock.appendChild(thinkToggle);
  thinkBlock.appendChild(thinkBody);
  block.appendChild(thinkBlock);

  // Response block
  const respBlock = document.createElement("div");
  respBlock.className = "response-block streaming";
  block.appendChild(respBlock);

  // Meta row
  const metaRow = document.createElement("div");
  metaRow.className = "response-meta";
  metaRow.style.display = "none";
  block.appendChild(metaRow);

  chatInner.appendChild(block);
  block.scrollIntoView({ behavior: "smooth", block: "end" });

  return { thinkBlock, thinkBody, respBlock, metaRow };
}

// ── Core send logic ───────────────────────────────────────────────────────────
async function sendMessage(text, showBubble = true) {
  if (btnSend.disabled) return;

  setBusy(true);
  abortController = new AbortController();

  const { thinkBlock, thinkBody, respBlock, metaRow } =
    createExchange(showBubble ? text : null);

  // Build messages array for /api/chat
  const messages = [{ role: "system", content: systemPrompt }];
  for (const entry of chatHistory) {
    messages.push({ role: "user",      content: entry.prompt });
    messages.push({ role: "assistant", content: entry.response });
  }
  messages.push({ role: "user", content: text });

  const payload = {
    model:    modelSelect.value,
    messages: messages,
    stream:   true,
    think:    true,
  };

  let thinkBuf = "";
  let respBuf  = "";
  let inThink  = false;

  try {
    const res = await fetch(`${OLLAMA_URL}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: abortController.signal,
    });
    if (!res.ok) throw new Error(`Ollama returned ${res.status}`);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      for (const line of decoder.decode(value, { stream: true }).split("\n")) {
        if (!line.trim()) continue;
        let chunk;
        try { chunk = JSON.parse(line); } catch { continue; }

        const msg           = chunk.message || {};
        const thinkingChunk = msg.thinking  || chunk.thinking || "";
        const textChunk     = msg.content   || chunk.response || "";

        if (thinkingChunk) {
          thinkBuf += thinkingChunk;
          thinkBlock.style.display = "";
          thinkBlock.classList.add("streaming");
          thinkBody.textContent = thinkBuf;
          if (thinkBlock.classList.contains("open"))
            thinkBody.scrollTop = thinkBody.scrollHeight;
        }

        if (textChunk) {
          let t = textChunk;
          while (t) {
            if (inThink) {
              const end = t.indexOf("</think>");
              if (end === -1) { thinkBuf += t; t = ""; }
              else { thinkBuf += t.slice(0, end); t = t.slice(end + 8); inThink = false; }
              thinkBlock.style.display = "";
              thinkBlock.classList.add("streaming");
              thinkBody.textContent = thinkBuf;
            } else {
              const start = t.indexOf("<think>");
              if (start === -1) { respBuf += t; t = ""; }
              else { respBuf += t.slice(0, start); t = t.slice(start + 7); inThink = true; }
              respBlock.textContent = respBuf;
              respBlock.scrollIntoView({ behavior: "smooth", block: "end" });
            }
          }
        }

        if (chunk.done) break;
      }
    }

    const t = stopTimer();
    timerDisplay.textContent = t ? `${t}s` : "";

    thinkBlock.classList.remove("streaming");
    respBlock.classList.remove("streaming");

    lastResponse = respBuf;

    if (respBuf || thinkBuf) {
      // Always record in chatHistory for model context
      chatHistory.push({ prompt: text, response: respBuf });
      // Only add real user turns to the print transcript
      if (showBubble) {
        transcript.push({ prompt: text, thinking: thinkBuf, response: respBuf });
      }
    }

    if (respBuf) {
      const captured = respBuf;
      metaRow.style.display = "flex";
      if (t) {
        const timeSpan = document.createElement("span");
        timeSpan.className = "meta-time";
        timeSpan.textContent = `${t}s`;
        metaRow.appendChild(timeSpan);
      }
      const printBtn = document.createElement("button");
      printBtn.className = "meta-print";
      printBtn.textContent = "Print";
      printBtn.addEventListener("click", () => triggerPrint());
      metaRow.appendChild(printBtn);
    }

    statusLabel.textContent = abortController.signal.aborted ? "Stopped" : "";

  } catch (err) {
    stopTimer();
    thinkBlock.classList.remove("streaming");
    respBlock.classList.remove("streaming");
    if (err.name !== "AbortError") {
      respBlock.textContent =
        `Could not connect to Ollama at ${OLLAMA_URL}.\nMake sure Ollama is running (ollama serve).`;
      statusLabel.textContent = "Connection error";
    } else {
      statusLabel.textContent = "Stopped";
    }
  } finally {
    setBusy(false);
  }
}

// Send from input box
async function send() {
  const prompt = promptInput.value.trim();
  if (!prompt) return;
  promptInput.value = "";
  promptInput.style.height = "auto";
  await sendMessage(prompt, true);
}

// Auto-trigger Ada's opening message after name capture
async function kickoff() {
  await sendMessage("hello", false);
}

// ── Print ─────────────────────────────────────────────────────────────────────
function printLast() { triggerPrint(); }

function triggerPrint() {
  if (!transcript.length) { statusLabel.textContent = "Nothing to print"; return; }
  if (!printerIp)          { statusLabel.textContent = "No printer IP — open Settings"; return; }
  statusLabel.textContent = "Sending to printer…";
  buildAndPrint();
}

function buildAndPrint() {
  const SEP  = "-".repeat(40);
  const body = [];

  if (participantName) { body.push(`PARTICIPANT: ${participantName}`, ""); }

  body.push("TRANSCRIPT", SEP);
  for (const ex of transcript) {
    body.push(`User: ${ex.prompt}`, "", `Ada: ${ex.response}`, "");
  }
  if (printPrefix) { body.push(SEP, printPrefix); }

  const url = `http://${printerIp}:8080/?code=${encodeURIComponent(body.join("\n"))}`;
  fetch(url, { mode: "no-cors" })
    .then(() => { statusLabel.textContent = "Printed successfully"; })
    .catch(err => { statusLabel.textContent = `Printer error: ${err.message}`; });
}

// ── Clear ─────────────────────────────────────────────────────────────────────
function clearChat() {
  chatInner.innerHTML = "";
  chatInner.appendChild(emptyState);
  emptyState.style.display = "";
  timerDisplay.textContent = "";
  statusLabel.textContent  = "";
  lastResponse    = "";
  transcript      = [];
  chatHistory     = [];
  participantName = "";
}

function newUser() {
  if (abortController) abortController.abort();
  clearChat();
  showWelcome();
}

function submitSession() {
  triggerPrint();
  if (abortController) abortController.abort();
  clearChat();
  showWelcome();
}

// ── Busy ──────────────────────────────────────────────────────────────────────
function setBusy(busy) {
  btnSend.disabled = busy;
  btnStop.disabled = !busy;
  if (busy) {
    startTimer();
    statusLabel.textContent = "Generating…";
  }
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
promptInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── Wiring ────────────────────────────────────────────────────────────────────
btnSend.addEventListener("click", send);
btnStop.addEventListener("click", () => abortController && abortController.abort());
btnClear.addEventListener("click", clearChat);
btnNewUser.addEventListener("click", newUser);
document.getElementById("btn-submit-session").addEventListener("click", submitSession);
document.getElementById("btn-print-last").addEventListener("click", printLast);

// Settings modal
const systemPromptInput    = document.getElementById("system-prompt-input");
const printPrefixInput     = document.getElementById("print-prefix-input");
const printerIpInput       = document.getElementById("printer-ip-input");
const participantNameInput = document.getElementById("participant-name-input");

document.getElementById("btn-sysprompt").addEventListener("click", () => {
  systemPromptInput.value    = systemPromptTemplate;
  printPrefixInput.value     = printPrefix;
  printerIpInput.value       = printerIp;
  participantNameInput.value = participantName;
  modalOverlay.classList.add("open");
});
document.getElementById("modal-save").addEventListener("click", () => {
  systemPromptTemplate = systemPromptInput.value.trim();
  systemPrompt         = systemPromptTemplate.replaceAll("{NAME}", participantName);
  printPrefix          = printPrefixInput.value.trim();
  printerIp            = printerIpInput.value.trim();
  participantName      = participantNameInput.value.trim();
  modalOverlay.classList.remove("open");
});
document.getElementById("modal-clear-btn").addEventListener("click", () => {
  systemPromptInput.value = "";
});
document.getElementById("modal-cancel").addEventListener("click", () => {
  modalOverlay.classList.remove("open");
});
modalOverlay.addEventListener("click", e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove("open");
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") modalOverlay.classList.remove("open");
});
</script>
